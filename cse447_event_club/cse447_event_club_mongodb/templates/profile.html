{% extends 'base.html' %}
{% block body %}
<div class="row g-4">
    <div class="col-lg-4">
        <div class="glass-card p-4 h-100">
            <span class="mini-icon mb-3"><i class="bi bi-person-circle"></i></span>
            <h3 class="fw-bold mb-2">{{data.username}}</h3>
            <p class="text-muted mb-3">Role: <span class="badge rounded-pill text-bg-primary">{{data.role}}</span></p>
            {% if data.mac_ok %}
                <div class="alert alert-success rounded-4 mb-0"><i class="bi bi-check-circle me-2"></i>MAC status: OK</div>
            {% else %}
                <div class="alert alert-danger rounded-4 mb-0"><i class="bi bi-exclamation-triangle me-2"></i>MAC status: FAILED</div>
            {% endif %}
        </div>
    </div>
    <div class="col-lg-8">
        <div class="glass-card p-4 p-md-5">
            <h2 class="fw-bold mb-4">Update Profile</h2>
            <form method="post" class="d-grid gap-3">
                <div>
                    <label class="form-label fw-semibold">Email</label>
                    <input class="form-control" name="email" value="{{data.email}}" required>
                </div>
                <div>
                    <label class="form-label fw-semibold">Contact Info</label>
                    <input class="form-control" name="contact" value="{{data.contact}}" required>
                </div>
                <div>
                    <label class="form-label fw-semibold">Profile Details</label>
                    <textarea class="form-control" name="profile" rows="6">{{data.profile}}</textarea>
                </div>
                <button class="btn-primary-custom justify-content-center" type="submit"><i class="bi bi-cloud-check"></i>Update Profile</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
