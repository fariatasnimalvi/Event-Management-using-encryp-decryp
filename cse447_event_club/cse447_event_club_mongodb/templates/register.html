{% extends 'base.html' %}
{% block body %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="glass-card p-4 p-md-5">
            <div class="text-center mb-4">
                <span class="mini-icon mb-3"><i class="bi bi-person-plus-fill"></i></span>
                <h2 class="fw-bold mb-1">Create Secure Account</h2>
                <p class="text-muted mb-0">Your information will be encrypted before MongoDB storage.</p>
            </div>
            <form method="post" class="d-grid gap-3">
                <div>
                    <label class="form-label fw-semibold">Username</label>
                    <input class="form-control" name="username" placeholder="Choose username" required>
                </div>
                <div>
                    <label class="form-label fw-semibold">Email</label>
                    <input class="form-control" name="email" placeholder="example@email.com" required>
                </div>
                <div>
                    <label class="form-label fw-semibold">Contact Info</label>
                    <input class="form-control" name="contact" placeholder="Phone or contact information" required>
                </div>
                <div>
                    <label class="form-label fw-semibold">Password</label>
                    <input class="form-control" name="password" type="password" placeholder="Create password" required>
                </div>
                <button class="btn-primary-custom justify-content-center" type="submit"><i class="bi bi-check-circle"></i>Create Account</button>
            </form>
            <div class="alert alert-info mt-4 mb-0 rounded-4">
                <i class="bi bi-info-circle me-2"></i>Use username <b>admin</b> to create the admin account.
            </div>
        </div>
    </div>
</div>
{% endblock %}
