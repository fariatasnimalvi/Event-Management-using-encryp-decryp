{% extends 'base.html' %}
{% block body %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="glass-card p-4 p-md-5 text-center">
            <span class="mini-icon mb-3"><i class="bi bi-key-fill"></i></span>
            <h2 class="fw-bold mb-2">Save Your 2FA Secret</h2>
            <p class="text-muted">Keep this information safe. It is required for secure login verification.</p>
            <div class="row g-3 my-3">
                <div class="col-md-6"><div class="stat-card p-3"><div class="small text-muted">Secret</div><div class="code-box mt-2">{{secret}}</div></div></div>
                <div class="col-md-6"><div class="stat-card p-3"><div class="small text-muted">Current Demo OTP</div><div class="code-box mt-2">{{code}}</div></div></div>
            </div>
            <a class="btn-primary-custom" href="/login"><i class="bi bi-box-arrow-in-right"></i>Go to Login</a>
        </div>
    </div>
</div>
{% endblock %}
