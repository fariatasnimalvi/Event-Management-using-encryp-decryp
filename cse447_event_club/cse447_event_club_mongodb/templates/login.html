{% extends 'base.html' %}
{% block body %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="glass-card p-4 p-md-5">
            <div class="text-center mb-4">
                <span class="mini-icon mb-3"><i class="bi bi-shield-lock-fill"></i></span>
                <h2 class="fw-bold mb-1">Login - Step 1</h2>
                <p class="text-muted mb-0">Enter your primary credentials.</p>
            </div>
            <form method="post" class="d-grid gap-3">
                <div>
                    <label class="form-label fw-semibold">Username</label>
                    <input class="form-control" name="username" placeholder="Enter username" required>
                </div>
                <div>
                    <label class="form-label fw-semibold">Password</label>
                    <input class="form-control" name="password" type="password" placeholder="Enter password" required>
                </div>
                <button class="btn-primary-custom justify-content-center" type="submit"><i class="bi bi-arrow-right-circle"></i>Continue to 2FA</button>
            </form>
            <p class="text-center text-muted mt-4 mb-0">No account? <a href="/register" class="fw-bold text-decoration-none">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
