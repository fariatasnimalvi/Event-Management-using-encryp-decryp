<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CSE447 Secure Event/Club System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --dark: #0f172a;
            --panel: rgba(255, 255, 255, 0.92);
            --primary: #4f46e5;
            --secondary: #06b6d4;
            --success: #16a34a;
            --danger: #dc2626;
            --muted: #64748b;
            --border: rgba(148, 163, 184, 0.35);
        }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            color: #1e293b;
            background:
                radial-gradient(circle at top left, rgba(79, 70, 229, 0.25), transparent 32%),
                radial-gradient(circle at top right, rgba(6, 182, 212, 0.22), transparent 28%),
                linear-gradient(135deg, #eef2ff 0%, #f8fafc 48%, #ecfeff 100%);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .app-shell { min-height: 100vh; }
        .topbar {
            backdrop-filter: blur(16px);
            background: rgba(15, 23, 42, 0.92);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .brand-badge {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: inline-grid;
            place-items: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 12px 28px rgba(79, 70, 229, 0.35);
        }
        .nav-link {
            color: rgba(255,255,255,0.78) !important;
            font-weight: 600;
            border-radius: 12px;
            padding: 9px 13px !important;
        }
        .nav-link:hover { color: white !important; background: rgba(255,255,255,0.10); }
        .page-wrap { max-width: 1180px; margin: 0 auto; padding: 34px 16px 70px; }
        .glass-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.11);
        }
        .hero-card {
            background: linear-gradient(135deg, rgba(15,23,42,0.97), rgba(30,41,59,0.92));
            color: white;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 26px 75px rgba(15, 23, 42, 0.25);
        }
        .hero-card::after {
            content: "";
            position: absolute;
            width: 360px;
            height: 360px;
            right: -140px;
            top: -120px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(79,70,229,0.65), rgba(6,182,212,0.45));
        }
        .hero-content { position: relative; z-index: 2; }
        .soft-label {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 700;
            background: rgba(79, 70, 229, 0.10);
            color: #3730a3;
        }
        .hero-card .soft-label { background: rgba(255,255,255,0.12); color: white; }
        .btn-primary-custom {
            border: 0;
            color: white;
            font-weight: 700;
            border-radius: 14px;
            padding: 11px 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 14px 28px rgba(79, 70, 229, 0.28);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary-custom:hover { color: white; transform: translateY(-1px); }
        .btn-ghost {
            border: 1px solid rgba(255,255,255,0.22);
            color: white;
            border-radius: 14px;
            padding: 11px 18px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.10); color: white; }
        .form-control, .form-select {
            border-radius: 15px;
            border-color: #cbd5e1;
            padding: 12px 14px;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.22rem rgba(79,70,229,0.16);
        }
        .security-pill {
            border-radius: 999px;
            background: #ecfeff;
            border: 1px solid #a5f3fc;
            color: #0e7490;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 7px 10px;
        }
        .stat-card {
            border-radius: 22px;
            border: 1px solid var(--border);
            background: white;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        }
        .post-card {
            border: 1px solid var(--border);
            border-radius: 24px;
            background: white;
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
            transition: 0.2s ease;
        }
        .post-card:hover { transform: translateY(-3px); box-shadow: 0 24px 50px rgba(15, 23, 42, 0.12); }
        .flash-message {
            border-radius: 18px;
            border: 1px solid #bfdbfe;
            background: #eff6ff;
            color: #1d4ed8;
            padding: 13px 16px;
            margin-bottom: 18px;
            font-weight: 600;
        }
        .code-box {
            background: #0f172a;
            color: #67e8f9;
            border-radius: 16px;
            padding: 12px 14px;
            font-weight: 800;
            letter-spacing: 1px;
            display: inline-block;
        }
        .mini-icon {
            width: 42px;
            height: 42px;
            border-radius: 15px;
            display: inline-grid;
            place-items: center;
            background: #eef2ff;
            color: var(--primary);
        }
        footer { color: var(--muted); font-size: 0.88rem; }
    </style>
</head>
<body>
<div class="app-shell">
    <nav class="navbar navbar-expand-lg topbar navbar-dark sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="/">
                <span class="brand-badge"><i class="bi bi-shield-lock-fill"></i></span>
                <span>SecureClub</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto gap-1">
                    <a class="nav-link" href="/"><i class="bi bi-house-door me-1"></i>Home</a>
                    <a class="nav-link" href="/dashboard"><i class="bi bi-calendar-event me-1"></i>Posts</a>
                    <a class="nav-link" href="/profile"><i class="bi bi-person-circle me-1"></i>Profile</a>
                    <a class="nav-link" href="/admin"><i class="bi bi-sliders me-1"></i>Admin</a>
                    <a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="page-wrap">
        {% with messages=get_flashed_messages() %}
            {% for m in messages %}
                <div class="flash-message"><i class="bi bi-info-circle-fill me-2"></i>{{m}}</div>
            {% endfor %}
        {% endwith %}
        {% block body %}{% endblock %}
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
